<!doctype html>
<html lang="en">
  <head>
    <meta
      http-equiv="Content-Security-Policy"
      content="base-uri 'self'; default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; object-src 'none'; worker-src 'self'; frame-src 'none'; form-action 'self'; manifest-src 'self'"
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="/static/css/style.css" />
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" />
    <title>{% block title %}WCA Predictor{% endblock %}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
      <div class="container">
        <a class="navbar-brand" href="/">WCA Predictor</a>
        <div class="ms-auto d-flex gap-2">
          {% if session.get("2fa_verified") %}
          <span class="navbar-text me-2">{{ session.get("user_email") }}</span>
          <a class="btn btn-outline-danger btn-sm" href="/logout.html"
            >Logout</a
          >
          {% else %}
          <a class="btn btn-outline-primary btn-sm" href="/login.html">Login</a>
          <a class="btn btn-primary btn-sm" href="/signup.html">Sign up</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container my-4">{% block content %}{% endblock %}</main>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
